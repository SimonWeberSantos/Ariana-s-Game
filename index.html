<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ariana's Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title-ariana hidden">
        <h1>ARIANA WEBER SANTOS</h1>
      </div>
      <div class="title-animal">
        <img class="image" src="unicorn.png" alt="unicorn" />
        <img class="image" src="meerkat.png" alt="meerkat" />
        <img class="image" src="elephant.png" alt="elephant" />
        <img class="image" src="giraf.png" alt="giraf" />
        <img class="image" src="fox.png" alt="fox" />
        <img class="image" src="parrot.png" alt="parrot" />
      </div>
    </header>

    <main>
      <div class="calculator">
        <p><span class="number1">1</span> + <span class="number2">1</span></p>
        <input type="number" class="calcResult" />
        <button class="checkCalc">Check</button>
        <img
          class="math-img correct hidden"
          src="unicorn_dancing.gif"
          alt="right answer"
        />
        <img
          class="math-img wrong hidden"
          src="unicorn_crying.gif"
          alt="wrong answer"
        />
      </div>

      <div class="words">
        <p><span class="random-word"></span></p>
        <input type="text" class="textInput" />
        <button class="checkWord">Check</button>
        <img
          class="word-img correct hidden"
          src="unicorn_dancing.gif"
          alt="right answer"
        />
        <img
          class="word-img wrong hidden"
          src="unicorn_crying.gif"
          alt="wrong answer"
        />
      </div>
    </main>
    <!-- This is a comment 
    <img src="unicorn_dancing.gif" alt="dancing-unicorn" /> -->
    <script src="script.js"></script>
  </body>
</html>
